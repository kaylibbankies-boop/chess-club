<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Club • Pretoria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', system_ui, sans-serif;
        }
        .nav-item {
            transition: all 0.2s;
        }
        .nav-item.active {
            background-color: rgb(245 158 11);
            color: black;
            font-weight: 600;
        }
        .nav-item:hover:not(.active) {
            background-color: rgb(39 39 42);
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <div class="flex h-screen">

        <!-- Sidebar -->
        <div class="w-72 bg-zinc-900 border-r border-zinc-800 p-6 flex flex-col">
            <div class="flex items-center gap-3 mb-12">
                <div class="w-11 h-11 bg-amber-500 rounded-2xl flex items-center justify-center text-3xl shadow-lg">♟️</div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight">Chess Club</h1>
                    <p class="text-xs text-zinc-500">Pretoria • Admin</p>
                </div>
            </div>

            <nav class="flex-1 space-y-1">
                <a onclick="navigate('members')" class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl cursor-pointer active">
                    <i class="fas fa-users w-5"></i>
                    <span class="text-lg">Members</span>
                </a>
                <a onclick="navigate('record')" class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl cursor-pointer">
                    <i class="fas fa-chess-board w-5"></i>
                    <span class="text-lg">Record Match</span>
                </a>
                <a onclick="navigate('leaderboard')" class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl cursor-pointer">
                    <i class="fas fa-trophy w-5"></i>
                    <span class="text-lg">Leaderboard</span>
                </a>
                <a onclick="navigate('history')" class="nav-item flex items-center gap-3 px-5 py-4 rounded-2xl cursor-pointer">
                    <i class="fas fa-history w-5"></i>
                    <span class="text-lg">Match History</span>
                </a>
            </nav>

            <div id="header-user" class="mt-auto pt-8 border-t border-zinc-800"></div>
        </div>

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col">
            <!-- Top Header -->
            <header class="h-16 border-b border-zinc-800 bg-zinc-900 px-8 flex items-center justify-between">
                <h1 id="page-title" class="text-2xl font-semibold">Members</h1>
            </header>

            <!-- Page Content -->
            <div id="main-content" class="flex-1 p-8 overflow-auto">
                <!-- Content loaded dynamically by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Tailwind Script -->
    <script src="/static/js/app.js"></script>
</body>
</html>
